name: Bot Alertas P2P USDT

# Corre cada 5 minutos durante el horario activo Colombia (6:00 AM - 1:00 AM).
# Colombia = UTC-5, así que:
#   6 AM Col = 11:00 UTC
#   1 AM Col del día siguiente = 06:00 UTC (mismo día UTC)
# Ventana UTC: 11:00 - 05:59 (cruza medianoche UTC).
on:
  schedule:
    # OJO: usamos minutos "raros" (3, 8, 13, 18, ..., 58) en vez de */5 (0, 5, 10, ...)
    # porque GitHub satura los slots redondos y demora / se salta corridas.
    - cron: '3-59/5 11-23 * * *'  # cada 5 min en hours 11–23 UTC = 6 AM–6:59 PM Col
    - cron: '3-59/5 0-5 * * *'    # cada 5 min en hours 0–5 UTC  = 7 PM–0:59 AM Col
  workflow_dispatch:  # Permite correrlo manualmente desde la UI de GitHub

# Si una corrida toma más de 5 min y se solapa con la siguiente, espera (no corre en paralelo).
concurrency:
  group: bot-p2p
  cancel-in-progress: false

jobs:
  alertas:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Descargar repo
        uses: actions/checkout@v5

      - name: Instalar Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Restaurar cooldown (anti-spam entre corridas)
        uses: actions/cache/restore@v5
        with:
          path: cooldown_state.json
          key: cooldown-state-${{ github.run_id }}
          restore-keys: |
            cooldown-state-

      - name: Correr el bot (un ciclo)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot_alertas_p2p.py --once

      - name: Guardar cooldown para próxima corrida
        if: always()
        uses: actions/cache/save@v5
        with:
          path: cooldown_state.json
          key: cooldown-state-${{ github.run_id }}
